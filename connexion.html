<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Administration | RIHANIO</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/png" href="logo.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Fraunces:wght@500;600&family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy:  { DEFAULT:'#1B1464', 700:'#170F52', 900:'#100B3B' },
          purple:{ DEFAULT:'#5B3AA6' },
          gold:  { DEFAULT:'#F0A93C', light:'#FBC873', dark:'#D98F1F' },
          ink:   '#221D3D', mist:'#F6F4FC', line:'#E7E2F3',
        },
        fontFamily: { sans: ['Inter','sans-serif'], display: ['Fraunces','serif'] }
      }
    }
  }
</script>

<style>
  body { font-family:'Inter', sans-serif; color:#221D3D; background:#F6F4FC; }
  .font-display { font-family:'Fraunces', serif; }
  a:focus-visible, button:focus-visible, input:focus-visible { outline: 2px solid #F0A93C; outline-offset: 2px; border-radius: 6px; }
  .field:focus { border-color: #5B3AA6; box-shadow: 0 0 0 4px rgba(91,58,166,.12); }
  .btn-login { transition: transform .2s cubic-bezier(.2,.8,.25,1), box-shadow .2s ease, background-color .2s ease; }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 14px 28px -12px rgba(27,20,100,.45); background-color:#170F52; }
  .shake { animation: shake .4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
  .card-enter { animation: cardEnter .5s cubic-bezier(.2,.8,.25,1) both; }
  @keyframes cardEnter { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>

<body class="antialiased min-h-screen grid place-items-center px-5 py-10">

  <form id="loginForm" novalidate class="card-enter w-full max-w-sm bg-white border border-line rounded-3xl shadow-sm p-8 sm:p-10 flex flex-col items-center text-center">

    <img src="logo.png" alt="Logo RIHANIO" class="h-20 w-20 object-contain mb-5">
    <h1 class="font-display font-semibold text-navy text-2xl">Espace Administration</h1>
    <p class="text-ink/50 text-sm mt-2 leading-relaxed">Connectez-vous avec votre compte administrateur</p>

    <div class="w-full mt-7 text-left">
      <label for="email" class="block text-navy text-xs font-extrabold tracking-wide uppercase mb-2">Email</label>
      <input id="email" name="email" type="email" autocomplete="username" placeholder="admin@diwan-almaaref.ma"
        class="field w-full rounded-2xl border border-line bg-mist px-4 py-3.5 text-sm text-navy placeholder:text-ink/30 outline-none transition-colors">
    </div>

    <div class="w-full mt-4 text-left">
      <label for="password" class="block text-navy text-xs font-extrabold tracking-wide uppercase mb-2">Mot de passe</label>
      <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••"
        class="field w-full rounded-2xl border border-line bg-mist px-4 py-3.5 text-sm text-navy placeholder:text-ink/30 outline-none transition-colors">
    </div>

    <p id="errorMsg" class="hidden w-full text-left text-xs font-bold text-rose-600 bg-rose-50 border border-rose-200 rounded-xl px-4 py-3 mt-4"></p>

    <button type="submit" class="btn-login w-full mt-7 bg-navy text-white font-extrabold text-sm rounded-full py-3.5 inline-flex items-center justify-center gap-2">
      Connexion
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <a href="index.html" class="mt-6 text-xs font-bold text-ink/40 hover:text-navy transition-colors">← Retour au site</a>
  </form>

<script type="module">
  import { auth, db, doc, getDoc, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from './supabase-config.js';

  const form = document.getElementById('loginForm');
  const errorMsg = document.getElementById('errorMsg');
  const submitBtn = form.querySelector('button[type="submit"]');

  // Si déjà connecté ET admin valide → direct vers l'espace administration
  onAuthStateChanged(auth, async (user) => {
    if (!user) return;
    const adminDoc = await getDoc(doc(db, 'admins', user.uid));
    if (adminDoc.exists()) window.location.replace('espace-administration.html');
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      errorMsg.textContent = "Veuillez remplir tous les champs.";
      errorMsg.classList.remove('hidden');
      return;
    }
    errorMsg.classList.add('hidden');
    submitBtn.disabled = true;
    const originalHtml = submitBtn.innerHTML;
    submitBtn.innerHTML = 'Connexion en cours...';

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const adminDoc = await getDoc(doc(db, 'admins', cred.user.uid));
      if (!adminDoc.exists()) {
        await signOut(auth);
        throw new Error('NOT_ADMIN');
      }
      window.location.href = 'espace-administration.html';
    } catch (err) {
      errorMsg.textContent = err.message === 'NOT_ADMIN'
        ? "Ce compte n'a pas les droits d'administration."
        : "Email ou mot de passe incorrect.";
      errorMsg.classList.remove('hidden');
      form.classList.remove('shake'); void form.offsetWidth; form.classList.add('shake');
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = originalHtml;
    }
  });
</script>
</body>
</html>
